input {
  # Logs Spring Boot via TCP (JSON)
  tcp {
    port => 5044
    codec => json_lines
    tags => ["backend"]
  }

  # Logs Caddy (frontend) via TCP
  tcp {
    port => 5045
    codec => json_lines
    tags => ["frontend"]
  }
}

filter {
  # Ajouter un timestamp si absent
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Normaliser le level en majuscules (Caddy envoie "info", Spring Boot envoie "INFO")
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "microcrm-logs-%{+YYYY.MM.dd}"
  }
}
