name: CI/CD Pipeline

on:
  push:
  pull_request:
    branches:
      - main

jobs:
  # ──────────────────────────────────────────────
  # Backend : Build, Tests, Couverture
  # ──────────────────────────────────────────────
  backend:
    name: Backend - Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Nécessaire pour l'analyse SonarQube

      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('back/gradle/wrapper/gradle-wrapper.properties', 'back/build.gradle') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Build et Tests
        run: ./gradlew build

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: back/build/reports/jacoco/test/jacocoTestReport.xml

      - name: Upload des rapports de tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-report
          path: back/build/reports/tests/

      - name: Upload des classes compilées (pour SonarQube)
        uses: actions/upload-artifact@v4
        with:
          name: backend-classes
          path: back/build/classes/

      - name: Upload du JAR (pour Release)
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: back/build/libs/microcrm-*.jar

  # ──────────────────────────────────────────────
  # Frontend : Build, Tests, Couverture
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend - Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Installation des dépendances
        run: npm ci

      - name: Build production
        run: npx @angular/cli build --configuration production

      - name: Tests unitaires
        run: npx @angular/cli test --no-watch --browsers=ChromeHeadless --code-coverage

      - name: Upload du rapport de couverture et tests
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage-report
          path: front/coverage/

      - name: Upload du dist frontend (pour Release)
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: front/dist/microcrm/browser/

  # ──────────────────────────────────────────────
  # Analyse qualité & sécurité - SonarQube Cloud
  # ──────────────────────────────────────────────
  sonarqube:
    name: SonarQube Cloud Analysis
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download rapport couverture backend
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage-report
          path: back/build/reports/jacoco/test/

      - name: Download classes compilées backend
        uses: actions/download-artifact@v4
        with:
          name: backend-classes
          path: back/build/classes/

      - name: Download rapport couverture frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage-report
          path: front/coverage/

      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────
  # CD : Publication des images Docker sur GHCR
  # ──────────────────────────────────────────────
  publish-docker:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend, sonarqube]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_BASE: ghcr.io/${{ github.repository }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Convertir le nom du repo en lowercase
        run: echo "IMAGE_BASE=${IMAGE_BASE,,}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          target: back
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/backend:latest
            ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image backend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}/backend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          target: front
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/frontend:latest
            ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image frontend (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}/frontend:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
