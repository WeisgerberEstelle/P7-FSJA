name: Release

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types:
      - completed
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  # ──────────────────────────────────────────────
  # Setup : noms des images en lowercase
  # ──────────────────────────────────────────────
  setup:
    name: Setup Image Names
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      backend_image: ${{ steps.names.outputs.backend }}
      frontend_image: ${{ steps.names.outputs.frontend }}
    steps:
      - name: Compute lowercase image names
        id: names
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          echo "backend=ghcr.io/${REPO}/backend" >> "$GITHUB_OUTPUT"
          echo "frontend=ghcr.io/${REPO}/frontend" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Semantic Release : version, changelog, artefacts
  # ──────────────────────────────────────────────
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    needs: setup
    outputs:
      new_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
    permissions:
      contents: write
      issues: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # ── Téléchargement des artifacts du workflow CI ──
      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: artifacts/backend
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Préparer artefact backend
        run: find artifacts/backend -name "microcrm-*.jar" ! -name "*-plain.jar" -exec cp {} microcrm-back.jar \;

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: artifacts/frontend
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Préparer artefact frontend
        run: tar -czf microcrm-front.tar.gz -C artifacts/frontend .

      # ── Semantic Release ──
      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install semantic-release et plugins
        run: npm install -g semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github @semantic-release/exec

      - name: Semantic Release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # ──────────────────────────────────────────────
  # Retag des images Docker avec la version semver
  # ──────────────────────────────────────────────
  retag-backend:
    name: Retag Backend Image
    needs: [release, setup]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, tag et push avec version semver
        run: |
          docker pull ${{ needs.setup.outputs.backend_image }}:latest
          docker tag ${{ needs.setup.outputs.backend_image }}:latest ${{ needs.setup.outputs.backend_image }}:${{ needs.release.outputs.new_version }}
          docker push ${{ needs.setup.outputs.backend_image }}:${{ needs.release.outputs.new_version }}

  retag-frontend:
    name: Retag Frontend Image
    needs: [release, setup]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull, tag et push avec version semver
        run: |
          docker pull ${{ needs.setup.outputs.frontend_image }}:latest
          docker tag ${{ needs.setup.outputs.frontend_image }}:latest ${{ needs.setup.outputs.frontend_image }}:${{ needs.release.outputs.new_version }}
          docker push ${{ needs.setup.outputs.frontend_image }}:${{ needs.release.outputs.new_version }}
